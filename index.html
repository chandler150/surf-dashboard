<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surf Report</title>
  <link rel="manifest" href="manifest.json" />
  <meta property="og:title" content="Surf Report" />
  <meta property="og:description" content="Live surf conditions at your favorite breaks" />
  <meta property="og:image" content="https://chandler150.github.io/surf-dashboard/og-image.svg" />
  <meta property="og:url" content="https://chandler150.github.io/surf-dashboard" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#08121f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Surf Report" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #08121f;
      --surface:  #0e1f31;
      --surface2: #142840;
      --border:   rgba(255,255,255,0.07);
      --text:     #ddeeff;
      --muted:    #6a95ae;
      --epic:     #00e676;
      --good:     #40c4ff;
      --fair:     #ffca28;
      --poor:     #ff5252;
      --flat:     #3a5568;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .header-left h1  { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.01em; color: #fff; }
    .header-left p   { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .header-right    { display: flex; align-items: center; gap: 10px; }
    #last-updated    { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #1c3550; }
    .btn svg   { width: 13px; height: 13px; flex-shrink: 0; }
    .btn-add   { background: rgba(64,196,255,0.1); border-color: rgba(64,196,255,0.25); color: var(--good); }
    .btn-add:hover { background: rgba(64,196,255,0.18); }
    .btn-refresh.spinning svg { animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 14px;
      padding: 22px 28px 40px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.18s, border-color 0.18s;
      position: relative;
    }
    .card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.14); }

    .quality-bar { height: 3px; }
    .quality-bar.epic        { background: var(--epic); }
    .quality-bar.good        { background: var(--good); }
    .quality-bar.fair        { background: var(--fair); }
    .quality-bar.poor        { background: var(--poor); }
    .quality-bar.flat        { background: var(--flat); }
    .quality-bar.loading-bar { background: var(--surface2); }

    .card-top {
      padding: 14px 18px 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .beach-name   { font-size: 1rem; font-weight: 600; color: #fff; }
    .beach-region { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

    .card-top-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }

    .btn-remove {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      opacity: 0.5;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
      line-height: 1;
      min-width: 30px;
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-remove:hover { opacity: 1; color: var(--poor); background: rgba(255,82,82,0.1); }

    .badge {
      font-size: 0.67rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 3px 9px; border-radius: 20px; flex-shrink: 0;
    }
    .badge.epic { background: rgba(0,230,118,0.13);  color: var(--epic); }
    .badge.good { background: rgba(64,196,255,0.13); color: var(--good); }
    .badge.fair { background: rgba(255,202,40,0.13); color: var(--fair); }
    .badge.poor { background: rgba(255,82,82,0.13);  color: var(--poor); }
    .badge.flat { background: rgba(58,85,104,0.3);   color: var(--muted); }

    .wave-display {
      padding: 2px 18px 14px;
      display: flex; align-items: baseline; gap: 6px;
    }
    .wave-ft    { font-size: 2.9rem; font-weight: 800; line-height: 1; color: #fff; letter-spacing: -0.02em; }
    .wave-unit  { font-size: 0.9rem; color: var(--muted); }
    .wave-range { font-size: 0.78rem; color: var(--muted); margin-left: 2px; }

    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--border); }
    .stat  { padding: 10px 14px; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 0.88rem; font-weight: 600; color: var(--text); white-space: nowrap; }
    .stat-sub   { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

    .offshore { color: var(--epic); }
    .cross    { color: var(--fair); }
    .onshore  { color: var(--poor); }
    .dir-arrow { display: inline-block; font-size: 0.9rem; line-height: 1; }

    /* ── Skeleton ── */
    .skel {
      background: var(--surface2); border-radius: 4px; display: inline-block;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.7; } }

    .card-error { padding: 12px 18px 16px; font-size: 0.78rem; color: var(--poor); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 60px 16px 16px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay[hidden] { display: none; }

    .modal {
      background: #0f2235;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .modal-head {
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .modal-head span { font-size: 0.95rem; font-weight: 600; color: #fff; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 1rem; cursor: pointer; padding: 2px 6px;
      border-radius: 6px; transition: color 0.15s, background 0.15s;
    }
    .modal-close:hover { color: #fff; background: rgba(255,255,255,0.08); }

    .search-input {
      width: 100%; padding: 14px 20px;
      background: transparent;
      border: none; border-bottom: 1px solid var(--border);
      color: var(--text); font-size: 0.95rem;
      outline: none;
    }
    .search-input::placeholder { color: var(--muted); }

    .search-status { padding: 8px 20px; font-size: 0.75rem; color: var(--muted); min-height: 30px; }

    .search-results { max-height: 320px; overflow-y: auto; }

    .search-result {
      width: 100%; padding: 12px 20px;
      background: none; border: none; border-bottom: 1px solid var(--border);
      text-align: left; cursor: pointer;
      display: flex; flex-direction: column; gap: 3px;
      transition: background 0.12s;
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: rgba(255,255,255,0.05); }
    .result-name   { font-size: 0.9rem; font-weight: 600; color: #fff; }
    .result-region { font-size: 0.75rem; color: var(--muted); }

    .search-empty { padding: 20px; font-size: 0.82rem; color: var(--muted); text-align: center; }
    .results-divider { padding: 6px 20px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); }

    /* ── Footer ── */
    footer { text-align: center; font-size: 0.7rem; color: var(--muted); padding-bottom: 24px; }
    footer a { color: var(--muted); }

    /* ── Card clickable / draggable ── */
    .card { cursor: pointer; }
    .card-ghost  { opacity: 0.35; border: 1px dashed rgba(255,255,255,0.2); }
    .card-chosen { box-shadow: 0 12px 40px rgba(0,0,0,0.5); transform: scale(1.02); z-index: 10; }

    /* ── Detail Panel ── */
    .detail-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .detail-overlay[hidden] { display: none; }

    .detail-header {
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .detail-back {
      background: none; border: none; color: var(--muted);
      font-size: 0.85rem; cursor: pointer; padding: 6px 10px;
      border-radius: 8px; transition: background 0.15s, color 0.15s;
      white-space: nowrap; display: flex; align-items: center; gap: 5px;
    }
    .detail-back:hover { background: var(--surface2); color: #fff; }
    .detail-title { flex: 1; min-width: 0; }
    .detail-title h2 { font-size: 1.05rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .detail-title p  { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    .detail-scroll { flex: 1; overflow-y: auto; padding-bottom: 48px; }

    .detail-current {
      display: grid; grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .detail-stat { padding: 14px 16px; border-right: 1px solid var(--border); }
    .detail-stat:last-child { border-right: none; }
    .detail-stat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px; }
    .detail-stat-value { font-size: 1.4rem; font-weight: 800; color: #fff; line-height: 1; }
    .detail-stat-value span { font-size: 0.8rem; font-weight: 400; color: var(--muted); }
    .detail-stat-sub { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }

    .detail-section { padding: 20px 20px 0; }
    .section-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); margin-bottom: 12px; }

    /* 7-day grid */
    .days-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; margin-bottom: 4px;
    }
    .day-col { padding: 12px 4px; text-align: center; border-right: 1px solid var(--border); }
    .day-col:last-child { border-right: none; }
    .day-name { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 8px; }
    .day-ht   { font-size: 0.72rem; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .day-session { margin-top: 5px; }
    .day-session-label { font-size: 0.52rem; color: var(--muted); margin-bottom: 2px; }
    .day-dot { width: 9px; height: 9px; border-radius: 50%; margin: 0 auto; }
    .day-dot.epic { background: var(--epic); box-shadow: 0 0 6px var(--epic); }
    .day-dot.good { background: var(--good); }
    .day-dot.fair { background: var(--fair); }
    .day-dot.poor { background: var(--poor); }
    .day-dot.flat { background: var(--flat); }

    /* Charts */
    .chart-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 12px 8px; margin-bottom: 16px;
      position: relative; height: 200px;
    }
    .chart-loading {
      display: flex; align-items: center; justify-content: center;
      height: 100%; font-size: 0.78rem; color: var(--muted);
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      header { padding: 16px; }
      .grid  { padding: 16px 16px 32px; gap: 12px; }
      .wave-ft { font-size: 2.4rem; }
      #last-updated { display: none; }
      .detail-current { grid-template-columns: repeat(2, 1fr); }
      .detail-stat:nth-child(2) { border-right: none; }
      .detail-stat:nth-child(3) { border-top: 1px solid var(--border); }
      .detail-stat:nth-child(4) { border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Surf Report</h1>
    <p>Live conditions at your favorite breaks</p>
  </div>
  <div class="header-right">
    <span id="last-updated">—</span>
    <button class="btn btn-add" onclick="openModal()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
      </svg>
      Add Spot
    </button>
    <button class="btn btn-refresh" id="refresh-btn" onclick="loadAll()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1.5 8a6.5 6.5 0 1 0 1.1-3.6"/>
        <polyline points="1.5 2 1.5 5.5 5 5.5"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

<!-- Add Spot Modal -->
<div id="modal" class="modal-overlay" hidden>
  <div class="modal">
    <div class="modal-head">
      <span>Add a Spot</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input id="search-input" class="search-input" type="text"
           placeholder="Search breaks, beaches, regions…" autocomplete="off" />
    <div id="search-results" class="search-results"></div>
  </div>
</div>

<!-- Detail Panel -->
<div id="detail" class="detail-overlay" hidden>
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="10 4 6 8 10 12"/></svg>
      Back
    </button>
    <div class="detail-title">
      <h2 id="detail-name"></h2>
      <p id="detail-region"></p>
    </div>
    <span id="detail-badge" class="badge"></span>
  </div>

  <div class="detail-scroll">
    <div class="detail-current" id="detail-current">
      <div class="chart-loading" style="grid-column:1/-1;padding:20px">Loading…</div>
    </div>

    <div class="detail-section">
      <div class="section-title">7-Day Forecast</div>
      <div id="detail-days"></div>
    </div>

    <div class="detail-section" id="detail-tide-section" style="display:none">
      <div class="section-title">Tides · 2 Days</div>
      <div class="chart-wrap"><canvas id="chart-tide"></canvas></div>
      <div id="tide-station" style="font-size:0.68rem;color:var(--muted);margin-top:6px;padding:0 4px"></div>
    </div>

    <div class="detail-section" id="detail-wave-section">
      <div class="section-title">Wave Height &amp; Swell · 72h</div>
      <div class="chart-wrap"><canvas id="chart-wave"></canvas></div>
    </div>

    <div class="detail-section" id="detail-wind-section">
      <div class="section-title">Wind &amp; Gusts · 72h</div>
      <div class="chart-wrap"><canvas id="chart-wind"></canvas></div>
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>

<footer>
  Wave &amp; swell data: <a href="https://open-meteo.com" target="_blank">Open-Meteo Marine API</a>
  &nbsp;·&nbsp; Wind: Open-Meteo Weather API
</footer>

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
const mToFt = m => m * 3.28084;

function fmtFt(m) {
  if (m == null || isNaN(m)) return '--';
  return mToFt(m).toFixed(1);
}

const COMPASS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
function degToCompass(deg) {
  if (deg == null) return '--';
  return COMPASS[Math.round(deg / 22.5) % 16];
}

function dirArrow(deg) {
  if (deg == null) return '';
  const rot = (deg + 180) % 360;
  return `<span class="dir-arrow" style="transform:rotate(${rot}deg)">↑</span>`;
}

function windChar(windDeg, beachFacing) {
  if (windDeg == null) return { cls: '', label: '' };
  const landDir = (beachFacing + 180) % 360;
  const diff = Math.abs(((windDeg - landDir) + 360) % 360);
  const norm = diff > 180 ? 360 - diff : diff;
  if (norm <= 50)  return { cls: 'offshore', label: 'Offshore' };
  if (norm <= 100) return { cls: 'cross',    label: 'Cross' };
  return                  { cls: 'onshore',  label: 'Onshore' };
}

function calcQuality(waveH, period, windSpd, windDeg, beachFacing) {
  const ft = mToFt(waveH || 0);
  if (ft < 0.5) return 'flat';
  let score = 0;
  if      (ft >= 8)   score += 5;
  else if (ft >= 5)   score += 4;
  else if (ft >= 3)   score += 3;
  else if (ft >= 1.5) score += 2;
  else                score += 1;
  if      (period >= 15) score += 4;
  else if (period >= 12) score += 3;
  else if (period >= 9)  score += 2;
  else if (period >= 6)  score += 1;
  const wc = windChar(windDeg, beachFacing);
  if      (wc.cls === 'offshore' && windSpd < 12) score += 3;
  else if (wc.cls === 'offshore')                 score += 2;
  else if (wc.cls === 'cross')                    score += 1;
  else if (windSpd > 15)                          score -= 2;
  if (score >= 9) return 'epic';
  if (score >= 6) return 'good';
  if (score >= 3) return 'fair';
  return 'poor';
}

const QUALITY_LABEL = { epic: 'Epic', good: 'Good', fair: 'Fair', poor: 'Poor', flat: 'Flat' };

// ─────────────────────────────────────────────
//  Fetch
// ─────────────────────────────────────────────
async function fetchBeach(beach) {
  const marineParams = [
    'wave_height','wave_period','wave_direction',
    'swell_wave_height','swell_wave_period','swell_wave_direction','wind_wave_height'
  ].join(',');

  const [mr, wr] = await Promise.all([
    fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${beach.lat}&longitude=${beach.lon}&current=${marineParams}`),
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${beach.lat}&longitude=${beach.lon}&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=mph`),
  ]);
  if (!mr.ok || !wr.ok) throw new Error('API error');
  const [md, wd] = await Promise.all([mr.json(), wr.json()]);
  const mc = md.current, wc = wd.current;
  return {
    waveHeight:  mc.wave_height,
    wavePeriod:  mc.wave_period,
    waveDir:     mc.wave_direction,
    swellHeight: mc.swell_wave_height,
    swellPeriod: mc.swell_wave_period,
    swellDir:    mc.swell_wave_direction,
    windWaveH:   mc.wind_wave_height,
    windSpeed:   wc.wind_speed_10m,
    windDir:     wc.wind_direction_10m,
    windGusts:   wc.wind_gusts_10m,
  };
}

function cardId(spot) {

}

function skeletonCard(spot) {

    <div class="card" id="${cardId(spot)}" onclick="openDetail('${spot.id}')">
      <div class="quality-bar loading-bar"></div>
      <div class="card-top">
        <div>

          <span class="skel" style="width:46px;height:20px;border-radius:20px"></span>
        </div>
      </div>
      <div class="wave-display">
        <span class="skel" style="width:90px;height:40px;border-radius:6px"></span>
      </div>
      <div class="stats">
        <div class="stat"><div class="skel" style="width:30px;height:14px"></div></div>
        <div class="stat"><div class="skel" style="width:54px;height:14px"></div></div>
        <div class="stat"><div class="skel" style="width:40px;height:14px"></div></div>
      </div>
    </div>`;
}

function renderCard(spot, data) {
  const el = document.getElementById(cardId(spot));
  if (!el) return;

  if (data.error) {
    el.innerHTML = `
      <div class="quality-bar flat"></div>
      <div class="card-top">
        <div>
          <div class="beach-name">${spot.name}</div>
          <div class="beach-region">${spot.region}</div>
        </div>
        <div class="card-top-right">
          <button class="btn-remove" onclick="event.stopPropagation();removeSpot('${spot.id}')" title="Remove">✕</button>
        </div>
      </div>
      <div class="card-error">Could not load data — check connection</div>`;
    return;
  }

  const quality    = calcQuality(data.waveHeight, data.wavePeriod, data.windSpeed, data.windDir, spot.facing);
  const wc         = windChar(data.windDir, spot.facing);
  const ft         = fmtFt(data.waveHeight);
  const windWaveFt = mToFt(data.windWaveH || 0);
  const baseFt     = mToFt(data.waveHeight || 0);
  const minFt      = Math.max(0, baseFt - windWaveFt * 0.4).toFixed(1);
  const maxFt      = (baseFt + windWaveFt * 0.3).toFixed(1);
  const rangeStr   = minFt !== maxFt ? `${minFt}–${maxFt}` : ft;

  el.innerHTML = `
    <div class="quality-bar ${quality}"></div>
    <div class="card-top">
      <div>
        <div class="beach-name">${spot.name}</div>
        <div class="beach-region">${spot.region}</div>
      </div>
      <div class="card-top-right">
        <button class="btn-remove" onclick="removeSpot('${spot.id}')" title="Remove">✕</button>
        <span class="badge ${quality}">${QUALITY_LABEL[quality]}</span>
      </div>
    </div>
    <div class="wave-display">
      <span class="wave-ft">${ft}</span>
      <span class="wave-unit">ft</span>
      <span class="wave-range">(${rangeStr})</span>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Period</div>
        <div class="stat-value">${data.wavePeriod != null ? data.wavePeriod.toFixed(0) + 's' : '--'}</div>
        <div class="stat-sub">${dirArrow(data.waveDir)} ${degToCompass(data.waveDir)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-value ${wc.cls}">${data.windSpeed != null ? data.windSpeed.toFixed(0) : '--'} mph</div>
        <div class="stat-sub">${degToCompass(data.windDir)} · ${wc.label}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Swell</div>
        <div class="stat-value">${fmtFt(data.swellHeight)} ft</div>
        <div class="stat-sub">${data.swellPeriod != null ? data.swellPeriod.toFixed(0) + 's' : '--'} ${degToCompass(data.swellDir)}</div>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
//  Add / Remove
// ─────────────────────────────────────────────
function removeSpot(id) {
  const spots = getSpots().filter(s => s.id !== id);
  saveSpots(spots);
  document.getElementById('card-' + id)?.remove();
}

async function addSpot(catalogSpot) {
  const spot = { ...catalogSpot, id: 'u' + Date.now() };
  const existing = getSpots();
  existing.push(spot);
  saveSpots(existing);
  closeModal();

  const grid = document.getElementById('grid');
  grid.insertAdjacentHTML('beforeend', skeletonCard(spot));
  try {
    renderCard(spot, await fetchBeach(spot));
  } catch(e) {
    renderCard(spot, { error: true });
  }
}

//  Modal + Search
// ─────────────────────────────────────────────
function openModal() {
  document.getElementById('modal').hidden = false;
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
  document.getElementById('search-status').textContent = '';
  setTimeout(() => document.getElementById('search-input').focus(), 60);
}

function closeModal() {
  document.getElementById('modal').hidden = true;
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

let allResults = []; // curated + geocoded, in order
let geoTimer;

document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(geoTimer);
  const q = e.target.value.trim();
  const resultsEl = document.getElementById('search-results');
  if (q.length < 1) { resultsEl.innerHTML = ''; allResults = []; return; }

  const added = getSpots();
  const notAdded = s => !added.some(a => Math.abs(a.lat - s.lat) < 0.01 && Math.abs(a.lon - s.lon) < 0.01);
  const ql = q.toLowerCase();

  // Curated matches — instant
  const curated = SURF_SPOTS
    .filter(notAdded)
    .filter(s => s.name.toLowerCase().includes(ql) || s.region.toLowerCase().includes(ql))
    .slice(0, 8);

  allResults = curated;
  renderSearchResults(allResults, false);

  // Geocoding fallback — debounced
  geoTimer = setTimeout(async () => {
    try {
      const res  = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=en&format=json`);
      const data = await res.json();
      const geo  = (data.results || [])
        .filter(notAdded)
        .filter(r => !curated.some(c => Math.abs(c.lat - r.latitude) < 0.05))
        .map(r => ({
          name:   r.name,
          region: [r.admin3 || r.admin2, r.admin1, r.country_code].filter(Boolean).join(', '),
          lat:    r.latitude,
          lon:    r.longitude,
          facing: 270,
          _geo:   true,
        }))
        .slice(0, 6);

      if (geo.length) {
        allResults = [...curated, ...geo];
        renderSearchResults(allResults, curated.length > 0);
      }
    } catch(e) { /* silently ignore */ }
  }, 400);
});

function renderSearchResults(spots, hasCurated) {
  const el = document.getElementById('search-results');
  if (!spots.length) {
    el.innerHTML = '<div class="search-empty">No spots found</div>';
    return;
  }

  let html = '';
  spots.forEach((s, i) => {
    if (s._geo && i > 0 && !spots[i-1]._geo && hasCurated) {
      html += `<div class="results-divider">Other locations</div>`;
    }
    html += `<button class="search-result" onclick="pickResult(${i})">
      <span class="result-name">${s.name}</span>
      <span class="result-region">${s.region}</span>
    </button>`;
  });
  el.innerHTML = html;
}

function pickResult(i) {
  const s = allResults[i];
  if (s) addSpot(s);
}

];

function nearestTideStation(lat, lon) {
  let best = null, bestDist = Infinity;
  for (const [slat, slon, id, name] of TIDE_STATIONS) {
    const dist = Math.hypot(lat - slat, lon - slon);
    if (dist < bestDist) { bestDist = dist; best = { id, name }; }
  }
  return bestDist < 10 ? best : null;
}

function parseNoaaTime(str) {
  const [date, time] = str.split(' ');
  const [y, m, d]    = date.split('-').map(Number);
  const [h, mn]      = time.split(':').map(Number);
  return new Date(y, m - 1, d, h, mn);
}

function fmtTideTime(d) {
  let h = d.getHours(), mn = d.getMinutes();
  const ap = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${h}:${String(mn).padStart(2,'0')}${ap}`;
}

async function fetchTides(spot) {
  const station = nearestTideStation(spot.lat, spot.lon);
  if (!station) return null;

  const now = new Date();
  const end = new Date(now.getTime() + 2 * 86400000);
  const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;

  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?station=${station.id}&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&application=surf_dashboard&format=json&begin_date=${fmt(now)}&end_date=${fmt(end)}`;
  const res  = await fetch(url);
  const data = await res.json();
  if (!data.predictions?.length) return null;
  return { station, predictions: data.predictions };
}

function renderTideChart(tideData) {
  const section = document.getElementById('detail-tide-section');
  if (!tideData) { section.style.display = 'none'; return; }

  section.style.display = 'block';
  document.getElementById('tide-station').textContent = `NOAA station: ${tideData.station.name}`;

  const preds = tideData.predictions.map(p => ({
    t: parseNoaaTime(p.t), v: parseFloat(p.v), type: p.type,
  }));

  const nowMs  = Date.now();
  const labels = [], values = [], hiLoVals = [], hiLoColors = [];

  for (let i = 0; i <= 48; i++) {
    const tMs = nowMs + i * 3600000;
    const t   = new Date(tMs);
    const h   = t.getHours();
    labels.push(
      h === 0  ? t.toLocaleDateString('en-US', { weekday: 'short' }) :
      h === 6  ? '6am'  :
      h === 12 ? '12pm' :
      h === 18 ? '6pm'  : ''
    );

    // Cosine interpolation between hi/lo points
    let before = null, after = null;
    for (const p of preds) {
      if (p.t.getTime() <= tMs) before = p;
      else if (!after) after = p;
    }
    let v = before?.v ?? after?.v ?? 0;
    if (before && after) {
      const frac = (tMs - before.t.getTime()) / (after.t.getTime() - before.t.getTime());
      v = before.v + (after.v - before.v) * (1 - Math.cos(frac * Math.PI)) / 2;
    }
    values.push(+v.toFixed(2));

    // Nearest hi/lo marker (within 30 min)
    const mark = preds.find(p => Math.abs(p.t.getTime() - tMs) < 1800000);
    hiLoVals.push(mark ? +mark.v.toFixed(2) : null);
    hiLoColors.push(mark?.type === 'H' ? '#40c4ff' : '#ffca28');
  }

  const ctx = document.getElementById('chart-tide').getContext('2d');
  detailCharts.push(new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Tide (ft)',
          data: values,
          borderColor: '#40c4ff',
          backgroundColor: 'rgba(64,196,255,0.08)',
          fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2,
        },
        {
          label: 'Hi / Lo',
          data: hiLoVals,
          borderColor: 'transparent',
          backgroundColor: 'transparent',
          pointRadius: hiLoVals.map(v => v != null ? 6 : 0),
          pointBackgroundColor: hiLoColors,
          pointBorderWidth: 0,
          showLine: false,
          tooltip: { callbacks: {
            label: c => {
              if (c.raw == null) return null;
              const tMs = nowMs + c.dataIndex * 3600000;
              const p   = preds.find(p => Math.abs(p.t.getTime() - tMs) < 1800000);
              return p ? ` ${p.type === 'H' ? 'High' : 'Low'}: ${c.raw} ft  ${fmtTideTime(p.t)}` : null;
            },
          }},
        },
      ],
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: { ...CHART_DEFAULTS.plugins, tooltip: { ...CHART_DEFAULTS.plugins.tooltip,
        callbacks: { label: c => c.datasetIndex === 0 ? ` Tide: ${c.raw} ft` : null },
      }},
    },
  }));
}

// ─────────────────────────────────────────────
//  Detail view
// ─────────────────────────────────────────────
let detailCharts = [];

function openDetail(id) {
  const spot = getSpots().find(s => s.id === id);
  if (!spot) return;
  document.getElementById('detail-name').textContent   = spot.name;
  document.getElementById('detail-region').textContent = spot.region;
  document.getElementById('detail-badge').className    = 'badge';
  document.getElementById('detail-badge').textContent  = '';
  document.getElementById('detail-current').innerHTML  = '<div class="chart-loading" style="grid-column:1/-1;padding:20px">Loading…</div>';
  document.getElementById('detail-days').innerHTML     = '';
  document.getElementById('detail-tide-section').style.display = 'none';
  document.getElementById('detail-wave-section').style.visibility = 'hidden';
  document.getElementById('detail-wind-section').style.visibility = 'hidden';
  detailCharts.forEach(c => c.destroy());
  detailCharts = [];
  document.getElementById('detail').hidden = false;
  document.body.style.overflow = 'hidden';
  loadDetail(spot);
}

function closeDetail() {
  document.getElementById('detail').hidden = true;
  document.body.style.overflow = '';
  detailCharts.forEach(c => c.destroy());
  detailCharts = [];
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('detail').hidden) closeDetail();
});

async function loadDetail(spot) {
  try {
    const marineH = 'wave_height,wave_period,wave_direction,swell_wave_height,swell_wave_period,swell_wave_direction';
    const marineC = marineH;
    const weatherH = 'wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation_probability';
    const weatherC = 'wind_speed_10m,wind_direction_10m,wind_gusts_10m';

    const [mr, wr] = await Promise.all([
      fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lon}&hourly=${marineH}&current=${marineC}&forecast_days=7`),
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lon}&hourly=${weatherH}&current=${weatherC}&wind_speed_unit=mph&temperature_unit=fahrenheit&forecast_days=7`),
    ]);
    if (!mr.ok || !wr.ok) throw new Error('API error');
    const [md, wd] = await Promise.all([mr.json(), wr.json()]);

    renderDetailCurrent(spot, md.current, wd.current);
    renderDetailDays(spot, md.hourly, wd.hourly);
    fetchTides(spot).then(renderTideChart).catch(() => {});
    renderWaveChart(md.hourly);
    renderWindChart(wd.hourly);
  } catch(e) {
    document.getElementById('detail-current').innerHTML =
      '<div class="chart-loading" style="grid-column:1/-1;padding:20px;color:var(--poor)">Could not load data</div>';
  }
}

function renderDetailCurrent(spot, mc, wc) {
  const quality = calcQuality(mc.wave_height, mc.wave_period, wc.wind_speed_10m, wc.wind_direction_10m, spot.facing);
  const wchar   = windChar(wc.wind_direction_10m, spot.facing);
  const badge   = document.getElementById('detail-badge');
  badge.className   = `badge ${quality}`;
  badge.textContent = QUALITY_LABEL[quality];

  document.getElementById('detail-current').innerHTML = `
    <div class="detail-stat">
      <div class="detail-stat-label">Waves</div>
      <div class="detail-stat-value">${fmtFt(mc.wave_height)}<span> ft</span></div>
      <div class="detail-stat-sub">${mc.wave_period?.toFixed(0) ?? '--'}s period</div>
    </div>
    <div class="detail-stat">
      <div class="detail-stat-label">Swell</div>
      <div class="detail-stat-value">${fmtFt(mc.swell_wave_height)}<span> ft</span></div>
      <div class="detail-stat-sub">${mc.swell_wave_period?.toFixed(0) ?? '--'}s ${degToCompass(mc.swell_wave_direction)}</div>
    </div>
    <div class="detail-stat">
      <div class="detail-stat-label">Wind</div>
      <div class="detail-stat-value ${wchar.cls}">${wc.wind_speed_10m?.toFixed(0) ?? '--'}<span> mph</span></div>
      <div class="detail-stat-sub">${degToCompass(wc.wind_direction_10m)} · ${wchar.label}</div>
    </div>
    <div class="detail-stat">
      <div class="detail-stat-label">Gusts</div>
      <div class="detail-stat-value">${wc.wind_gusts_10m?.toFixed(0) ?? '--'}<span> mph</span></div>
      <div class="detail-stat-sub">${degToCompass(wc.wind_direction_10m)}</div>
    </div>`;
}

function renderDetailDays(spot, marineH, weatherH) {
  const times = marineH.time;
  const days  = {};
  times.forEach((t, i) => {
    const key = t.slice(0, 10);
    (days[key] = days[key] || []).push(i);
  });

  const html = Object.keys(days).slice(0, 7).map(key => {
    const idxs   = days[key];
    const d      = new Date(key + 'T12:00:00');
    const label  = d.toLocaleDateString('en-US', { weekday: 'short' });
    const amIdxs = idxs.filter(i => { const h = new Date(times[i]).getHours(); return h >= 5 && h < 12; });
    const pmIdxs = idxs.filter(i => { const h = new Date(times[i]).getHours(); return h >= 12 && h < 18; });

    function sessionQ(ixs) {
      if (!ixs.length) return 'flat';
      const n  = ixs.length;
      const wH = ixs.reduce((s, i) => s + (marineH.wave_height[i] || 0), 0) / n;
      const p  = ixs.reduce((s, i) => s + (marineH.wave_period[i] || 0), 0) / n;
      const ws = ixs.reduce((s, i) => s + (weatherH.wind_speed_10m[i] || 0), 0) / n;
      const wd = weatherH.wind_direction_10m[ixs[Math.floor(n / 2)]];
      return calcQuality(wH, p, ws, wd, spot.facing);
    }

    const peakH = Math.max(...idxs.map(i => marineH.wave_height[i] || 0));
    const amQ   = sessionQ(amIdxs);
    const pmQ   = sessionQ(pmIdxs);

    return `<div class="day-col">
      <div class="day-name">${label}</div>
      <div class="day-ht">${fmtFt(peakH)}'</div>
      <div class="day-session"><div class="day-session-label">AM</div><div class="day-dot ${amQ}" title="${QUALITY_LABEL[amQ]}"></div></div>
      <div class="day-session"><div class="day-session-label">PM</div><div class="day-dot ${pmQ}" title="${QUALITY_LABEL[pmQ]}"></div></div>
    </div>`;
  }).join('');

  document.getElementById('detail-days').innerHTML = `<div class="days-grid">${html}</div>`;
}

function hoursFromNow(hourly, hours) {
  const now = Date.now();
  return hourly.time
    .map((t, i) => ({ ms: new Date(t).getTime(), i }))
    .filter(({ ms }) => ms >= now - 3600000 && ms <= now + hours * 3600000)
    .map(({ i }) => i);
}

function chartLabels(hourly, indices) {
  return indices.map(i => {
    const d = new Date(hourly.time[i]);
    const h = d.getHours();
    if (h === 0)  return d.toLocaleDateString('en-US', { weekday: 'short' });
    if (h === 6)  return '6am';
    if (h === 12) return '12pm';
    if (h === 18) return '6pm';
    return '';
  });
}

const CHART_DEFAULTS = {
  responsive: true, maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { labels: { color: '#6a95ae', font: { size: 11 }, boxWidth: 10, padding: 14 } },
    tooltip: {
      backgroundColor: '#0d1e30', borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1,
      titleColor: '#ddeeff', bodyColor: '#6a95ae', padding: 10,
    },
  },
  scales: {
    x: {
      ticks: {
        color: '#6a95ae', font: { size: 10 }, maxRotation: 0,
        autoSkip: false,
        callback: function(val) { const l = this.getLabelForValue(val); return l === '' ? null : l; },
      },
      grid: { color: 'rgba(255,255,255,0.04)' },
    },
    y: {
      ticks: { color: '#6a95ae', font: { size: 10 } },
      grid:  { color: 'rgba(255,255,255,0.04)' },
      beginAtZero: true,
    },
  },
};

function renderWaveChart(hourly) {
  const section = document.getElementById('detail-wave-section');
  const idxs    = hoursFromNow(hourly, 72);
  const labels  = chartLabels(hourly, idxs);
  const waveData  = idxs.map(i => +mToFt(hourly.wave_height[i] || 0).toFixed(1));
  const swellData = idxs.map(i => +mToFt(hourly.swell_wave_height[i] || 0).toFixed(1));

  const ctx = document.getElementById('chart-wave').getContext('2d');
  detailCharts.push(new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [
      { label: 'Wave (ft)', data: waveData, borderColor: '#40c4ff', backgroundColor: 'rgba(64,196,255,0.1)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 },
      { label: 'Swell (ft)', data: swellData, borderColor: '#00e676', backgroundColor: 'rgba(0,230,118,0.06)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 1.5, borderDash: [5,3] },
    ]},
    options: { ...CHART_DEFAULTS,
      plugins: { ...CHART_DEFAULTS.plugins, tooltip: { ...CHART_DEFAULTS.plugins.tooltip,
        callbacks: { label: c => ` ${c.dataset.label}: ${c.raw} ft` }
      }},
    },
  }));
  section.style.visibility = 'visible';
}

function renderWindChart(hourly) {
  const section = document.getElementById('detail-wind-section');
  const idxs    = hoursFromNow(hourly, 72);
  const labels  = chartLabels(hourly, idxs);
  const windData = idxs.map(i => +(hourly.wind_speed_10m[i] || 0).toFixed(0));
  const gustData = idxs.map(i => +(hourly.wind_gusts_10m[i] || 0).toFixed(0));

  const ctx = document.getElementById('chart-wind').getContext('2d');
  detailCharts.push(new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [
      { label: 'Wind (mph)', data: windData, borderColor: '#ffca28', backgroundColor: 'rgba(255,202,40,0.1)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 },
      { label: 'Gusts (mph)', data: gustData, borderColor: '#ff5252', backgroundColor: 'transparent', fill: false, tension: 0.4, pointRadius: 0, borderWidth: 1.5, borderDash: [5,3] },
    ]},
    options: { ...CHART_DEFAULTS,
      plugins: { ...CHART_DEFAULTS.plugins, tooltip: { ...CHART_DEFAULTS.plugins.tooltip,
        callbacks: { label: c => ` ${c.dataset.label}: ${c.raw} mph` }
      }},
    },
  }));
  section.style.visibility = 'visible';
}

// ─────────────────────────────────────────────
//  Load all
// ─────────────────────────────────────────────
async function loadAll() {
  const spots = getSpots();
  const grid  = document.getElementById('grid');
  const btn   = document.getElementById('refresh-btn');
  const lu    = document.getElementById('last-updated');

  grid.innerHTML = spots.map(skeletonCard).join('');
  btn.classList.add('spinning');
  lu.textContent = 'Updating…';

  await Promise.all(spots.map(async spot => {
    try {
      renderCard(spot, await fetchBeach(spot));
    } catch(e) {
      renderCard(spot, { error: true });
    }
  }));

  btn.classList.remove('spinning');
  lu.textContent = 'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

loadAll();

Sortable.create(document.getElementById('grid'), {
  animation:       150,
  delay:           200,
  delayOnTouchOnly: true,
  ghostClass:      'card-ghost',
  chosenClass:     'card-chosen',
  onEnd() {
    const ids      = [...document.querySelectorAll('.card')].map(el => el.id.replace('card-', ''));
    const current  = getSpots();
    const reordered = ids.map(id => current.find(s => s.id === id)).filter(Boolean);
    saveSpots(reordered);
  },
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
