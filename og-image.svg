    <rect x="148" y="18" width="66" height="22" rx="11" fill="rgba(64,196,255,0.13)"/>
    <text x="181" y="33" font-family="Helvetica, sans-serif" font-size="11" font-weight="700" fill="#40c4ff" text-anchor="middle">GOOD</text>
